<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل حساب - ApexFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', system-ui, sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            max-width: 450px;
            width: 100%;
            border-radius: 32px;
            padding: 35px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            text-align: center;
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b, #3b82f6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 60px;
            border: 1px solid #cbd5e1;
            font-family: inherit;
            margin-top: 5px;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 60px;
            background: #3b82f6;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .verification-section {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed #ccc;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 30px;
            font-size: 14px;
        }
        .error { background: #fee2e2; color: #b91c1c; }
        .success { background: #dcfce7; color: #15803d; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">ApexFlow</div>
    <h3>إنشاء حساب جديد</h3>

    <div class="input-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="example@domain.com">
    </div>
    <div class="input-group">
        <label>كلمة المرور</label>
        <input type="password" id="password" placeholder="******">
    </div>
    <button id="sendBtn">إرسال رمز التحقق</button>

    <div id="verifySection" class="verification-section">
        <div class="input-group">
            <label>رمز التحقق</label>
            <input type="text" id="code" placeholder="أدخل الرقم المرسل">
        </div>
        <button id="confirmBtn">تأكيد التسجيل</button>
        <button id="resendBtn" style="background:#e2e8f0; color:#1e293b;">إعادة إرسال الرمز</button>
    </div>

    <div id="msg" class="message"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
    // ================== مفاتيح EmailJS (مدخلة بالفعل) ==================
    const PUBLIC_KEY = "drYsafX2o3j5AgTQR";
    const SERVICE_ID = "service_zcvft9a";
    const TEMPLATE_ID = "template_ameyfo3";
    // =================================================================

    emailjs.init(PUBLIC_KEY);

    let pendingEmail = null;
    let pendingPassword = null;
    let pendingCode = null;

    function showMessage(text, isError = true) {
        const msgDiv = document.getElementById('msg');
        msgDiv.textContent = text;
        msgDiv.className = `message ${isError ? 'error' : 'success'}`;
        setTimeout(() => { msgDiv.textContent = ''; }, 5000);
    }

    function generateCode() {
        return Math.floor(100000 + Math.random() * 900000).toString();
    }

    async function sendCode(email, code) {
        try {
            const response = await emailjs.send(SERVICE_ID, TEMPLATE_ID, {
                name: email.split('@')[0],
                code: code,
                email: email
            });
            return { success: true };
        } catch (error) {
            console.error(error);
            return { success: false };
        }
    }

    async function handleSendCode() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!email || !password) {
            showMessage('يرجى إدخال البريد وكلمة المرور');
            return;
        }
        const code = generateCode();
        const result = await sendCode(email, code);
        if (result.success) {
            pendingEmail = email;
            pendingPassword = password;
            pendingCode = code;
            showMessage(`✅ تم إرسال الرمز إلى ${email} (للاختبار: ${code})`, false);
            document.getElementById('verifySection').style.display = 'block';
            document.getElementById('sendBtn').disabled = true;
        } else {
            showMessage('❌ فشل الإرسال. تأكد من اتصال الإنترنت وإعدادات EmailJS.');
        }
    }

    function handleVerify() {
        const enteredCode = document.getElementById('code').value.trim();
        if (enteredCode !== pendingCode) {
            showMessage('الرمز غير صحيح');
            return;
        }
        let users = JSON.parse(localStorage.getItem('apexflow_users') || '[]');
        if (users.find(u => u.email === pendingEmail)) {
            showMessage('البريد مسجل مسبقاً');
            return;
        }
        users.push({ email: pendingEmail, password: pendingPassword, verified: true, createdAt: new Date().toISOString() });
        localStorage.setItem('apexflow_users', JSON.stringify(users));
        localStorage.setItem('apexflow_current_user', JSON.stringify({ email: pendingEmail }));
        showMessage('🎉 تم التسجيل بنجاح! جاري الانتقال...', false);
        setTimeout(() => { window.location.href = 'index.html'; }, 1500);
    }

    async function handleResend() {
        if (!pendingEmail) return;
        const newCode = generateCode();
        const result = await sendCode(pendingEmail, newCode);
        if (result.success) {
            pendingCode = newCode;
            showMessage(`🔄 تم إرسال رمز جديد إلى ${pendingEmail} (للاختبار: ${newCode})`, false);
        } else {
            showMessage('فشل إعادة الإرسال');
        }
    }

    document.getElementById('sendBtn').onclick = handleSendCode;
    document.getElementById('confirmBtn').onclick = handleVerify;
    document.getElementById('resendBtn').onclick = handleResend;
</script>
</body>
</html>
