<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ApexFlow | لوحة تحكم المتجر المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f4f6fc; font-family: 'Tajawal', 'Inter', sans-serif; color: #1e2a3e; padding: 24px 16px; }
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --gray-bg: #f8fafc;
            --card-white: #ffffff;
            --border-light: #eef2f6;
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.06);
            --radius-lg: 28px;
            --radius-md: 16px;
        }
        .container { max-width: 1440px; margin: 0 auto; }
        .dashboard-header {
            background: linear-gradient(120deg, #1e293b, #0f172a);
            border-radius: var(--radius-lg);
            padding: 28px 32px;
            margin-bottom: 32px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            box-shadow: 0 20px 32px -12px rgba(0,0,0,0.1);
        }
        .card {
            background: var(--card-white);
            border-radius: var(--radius-lg);
            padding: 28px;
            margin-bottom: 32px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #eef2f8;
            padding-bottom: 18px;
            margin-bottom: 24px;
        }
        .card-header i { font-size: 1.6rem; color: var(--primary); }
        .card-header h2 { font-size: 1.5rem; font-weight: 700; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: #334155; }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 20px;
            font-family: inherit;
            transition: 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 28px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .upload-area:hover { border-color: var(--primary); background: #f8fafc; }
        .images-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 16px;
        }
        .preview-item {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #e2e8f0;
        }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .remove-img {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0,0,0,0.6);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 48px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary { background: linear-gradient(95deg, var(--primary), var(--primary-dark)); color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-sm { padding: 6px 14px; font-size: 0.8rem; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
        .categories-list, .products-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; }
        .category-card, .product-card-mini {
            background: var(--gray-bg);
            border-radius: 24px;
            padding: 16px;
            text-align: center;
        }
        .product-card-mini img { width: 100%; height: 140px; object-fit: cover; border-radius: 18px; }
        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 2px solid #eef2f8;
            margin-bottom: 28px;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 12px 24px;
            font-weight: 600;
            cursor: pointer;
        }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .orders-grid { display: flex; flex-direction: column; gap: 18px; }
        .order-item-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            border: 1px solid #edf2f7;
        }
        .order-thumb { width: 64px; height: 64px; border-radius: 18px; object-fit: cover; }
        .badge {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .badge-pending { background: #ffedd5; color: #b45309; }
        .badge-confirmed { background: #dcfce7; color: #15803d; }
        .badge-rejected { background: #fee2e2; color: #b91c1c; }
        .toast-message {
            position: fixed;
            bottom: 24px;
            left: 24px;
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            transform: translateY(100px);
            transition: 0.3s;
            z-index: 1200;
        }
        .toast-message.show { transform: translateY(0); }
        @media (max-width: 700px) {
            .order-item-card { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="dashboard-header">
        <div class="header-title">
            <h1><i class="fas fa-crown"></i> ApexFlow - الأدمن</h1>
            <p>إدارة التصنيفات والمنتجات والطلبات</p>
        </div>
        <div class="header-badge"><i class="fas fa-store"></i> متجر متكامل</div>
    </div>

    <!-- قسم إدارة التصنيفات -->
    <div class="card">
        <div class="card-header">
            <i class="fas fa-tags"></i>
            <h2>إدارة التصنيفات (الأقسام)</h2>
        </div>
        <div class="flex-between">
            <div style="flex:2; display: flex; gap: 10px;">
                <input type="text" id="newCategoryName" class="form-input" placeholder="اسم التصنيف الجديد (مثل: تيشيرتات)" style="flex:3;">
                <button id="addCategoryBtn" class="btn btn-primary"><i class="fas fa-plus"></i> إضافة تصنيف</button>
            </div>
        </div>
        <div id="categoriesList" class="categories-list"></div>
    </div>

    <!-- قسم إضافة منتج جديد مع اختيار التصنيف -->
    <div class="card">
        <div class="card-header">
            <i class="fas fa-plus-circle"></i>
            <h2>إضافة منتج جديد</h2>
        </div>
        <form id="addProductForm">
            <div class="form-group">
                <label>اختر التصنيف *</label>
                <select id="productCategory" class="form-input" required></select>
            </div>
            <div class="form-group">
                <label>عنوان المنتج *</label>
                <input type="text" id="prodTitle" class="form-input" required>
            </div>
            <div class="form-group">
                <label>السعر (درهم) *</label>
                <input type="number" id="prodPrice" class="form-input" required>
            </div>
            <div class="form-group">
                <label>الوصف *</label>
                <textarea id="prodDesc" rows="3" class="form-input" required></textarea>
            </div>
            <div class="form-group">
                <label>صور المنتج (اختر من 1 إلى 5 صور)</label>
                <div class="upload-area" id="uploadArea"><i class="fas fa-cloud-upload-alt fa-2x"></i><p>انقر لاختيار الصور</p></div>
                <input type="file" id="imageInput" accept="image/*" multiple style="display:none;">
                <div id="imagesPreview" class="images-preview"></div>
            </div>
            <button type="submit" class="btn btn-primary">إضافة المنتج</button>
        </form>
    </div>

    <!-- قائمة المنتجات مع التصنيف -->
    <div class="card">
        <div class="card-header"><i class="fas fa-boxes"></i><h2>جميع المنتجات</h2></div>
        <div id="productsList" class="products-list"></div>
    </div>

    <!-- قسم الطلبات (نفس السابق) -->
    <div class="card">
        <div class="card-header"><i class="fas fa-truck"></i><h2>إدارة الطلبات</h2></div>
        <div class="tabs" id="ordersTabs">
            <button class="tab-btn active" data-tab="pending">قيد الانتظار</button>
            <button class="tab-btn" data-tab="confirmed">مؤكدة</button>
            <button class="tab-btn" data-tab="rejected">مرفوضة</button>
        </div>
        <div id="pendingTab" class="tab-pane active"><div id="pendingOrdersList" class="orders-grid"></div></div>
        <div id="confirmedTab" class="tab-pane" style="display:none;"><div id="confirmedOrdersList" class="orders-grid"></div></div>
        <div id="rejectedTab" class="tab-pane" style="display:none;"><div id="rejectedOrdersList" class="orders-grid"></div></div>
    </div>
</div>
<div id="toastMsg" class="toast-message"></div>

<script>
    // ------------------- التصنيفات -------------------
    let categories = [];
    function loadCategories() {
        const stored = localStorage.getItem('apexflow_categories');
        categories = stored ? JSON.parse(stored) : ['تيشيرتات', 'هوديز', 'اكسسوارات']; // تصنيفات افتراضية
        renderCategories();
        updateCategorySelect();
    }
    function saveCategories() { localStorage.setItem('apexflow_categories', JSON.stringify(categories)); renderCategories(); updateCategorySelect(); }
    function renderCategories() {
        const container = document.getElementById('categoriesList');
        if(!container) return;
        if(categories.length===0) { container.innerHTML = '<p>لا توجد تصنيفات</p>'; return; }
        let html = '';
        categories.forEach((cat, idx) => {
            html += `<div class="category-card"><div style="font-weight:bold;">${escapeHtml(cat)}</div>
                     <button class="btn btn-danger btn-sm" onclick="deleteCategory(${idx})">حذف</button></div>`;
        });
        container.innerHTML = html;
    }
    window.deleteCategory = function(index) {
        if(confirm('حذف هذا التصنيف سيحذف جميع منتجاته. استمر؟')) {
            const catName = categories[index];
            categories.splice(index,1);
            saveCategories();
            // حذف المنتجات التي تنتمي لهذا التصنيف
            let products = JSON.parse(localStorage.getItem('apexflow_products') || '[]');
            products = products.filter(p => p.category !== catName);
            localStorage.setItem('apexflow_products', JSON.stringify(products));
            renderProductsList();
            showToastMessage('تم حذف التصنيف ومنتجاته', '#ef4444');
        }
    };
    function updateCategorySelect() {
        const select = document.getElementById('productCategory');
        if(!select) return;
        select.innerHTML = '';
        categories.forEach(cat => {
            const option = document.createElement('option');
            option.value = cat;
            option.textContent = cat;
            select.appendChild(option);
        });
    }
    document.getElementById('addCategoryBtn').addEventListener('click', () => {
        const newCat = document.getElementById('newCategoryName').value.trim();
        if(newCat && !categories.includes(newCat)) {
            categories.push(newCat);
            saveCategories();
            document.getElementById('newCategoryName').value = '';
            showToastMessage(`تم إضافة تصنيف ${newCat}`, '#10b981');
        } else alert('التصنيف موجود أو فارغ');
    });

    // ------------------- المنتجات مع التصنيف -------------------
    let products = [];
    let selectedImages = [];
    function loadProducts() {
        const stored = localStorage.getItem('apexflow_products');
        products = stored ? JSON.parse(stored) : [];
        renderProductsList();
    }
    function saveProducts() { localStorage.setItem('apexflow_products', JSON.stringify(products)); renderProductsList(); }
    function renderProductsList() {
        const container = document.getElementById('productsList');
        if(!container) return;
        if(products.length===0) { container.innerHTML = '<div style="grid-column:1/-1; text-align:center;">لا توجد منتجات</div>'; return; }
        let html = '';
        products.forEach(p => {
            html += `<div class="product-card-mini">
                        <img src="${p.images[0] || ''}" onerror="this.src='https://placehold.co/200x200'">
                        <h4>${escapeHtml(p.title)}</h4>
                        <div>${p.price} درهم | ${p.category}</div>
                        <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p.id}')">حذف</button>
                    </div>`;
        });
        container.innerHTML = html;
    }
    window.deleteProduct = function(id) {
        if(confirm('حذف المنتج؟')) {
            products = products.filter(p => p.id !== id);
            saveProducts();
        }
    };
    function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2,8); }

    // رفع الصور
    const imageInput = document.getElementById('imageInput');
    const uploadArea = document.getElementById('uploadArea');
    const previewContainer = document.getElementById('imagesPreview');
    uploadArea.addEventListener('click', () => imageInput.click());
    imageInput.addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        if(selectedImages.length + files.length > 5) { alert('حد أقصى 5 صور'); return; }
        files.forEach(file => {
            if(!file.type.match('image.*')) return;
            const reader = new FileReader();
            reader.onload = (ev) => { selectedImages.push(ev.target.result); renderImagePreview(); };
            reader.readAsDataURL(file);
        });
        imageInput.value = '';
    });
    function renderImagePreview() {
        previewContainer.innerHTML = '';
        selectedImages.forEach((img, idx) => {
            const div = document.createElement('div'); div.className = 'preview-item';
            div.innerHTML = `<img src="${img}"><div class="remove-img" data-idx="${idx}"><i class="fas fa-times"></i></div>`;
            previewContainer.appendChild(div);
        });
        document.querySelectorAll('.remove-img').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-idx'));
                selectedImages.splice(idx,1);
                renderImagePreview();
            });
        });
    }
    document.getElementById('addProductForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const category = document.getElementById('productCategory').value;
        const title = document.getElementById('prodTitle').value.trim();
        const price = parseInt(document.getElementById('prodPrice').value);
        const desc = document.getElementById('prodDesc').value.trim();
        if(!category || !title || !price || !desc || selectedImages.length === 0) { alert('املأ جميع الحروف واختر صورة'); return; }
        const newProduct = { id: generateId(), category, title, price, description: desc, images: [...selectedImages], createdAt: new Date().toISOString() };
        products.push(newProduct);
        saveProducts();
        document.getElementById('addProductForm').reset();
        selectedImages = [];
        renderImagePreview();
        showToastMessage('تمت إضافة المنتج', '#10b981');
    });

    // ------------------- الطلبات (نفس السابق مع إضافة اسم التصنيف للعرض) -------------------
    let orders = [];
    function loadOrders() {
        const stored = localStorage.getItem('apexflow_orders_v2');
        orders = stored ? JSON.parse(stored) : [];
        renderAllTabs();
    }
    function saveOrders() { localStorage.setItem('apexflow_orders_v2', JSON.stringify(orders)); renderAllTabs(); }
    window.changeOrderStatus = function(orderId, newStatus) {
        const order = orders.find(o => o.id == orderId);
        if(order) { order.status = newStatus; saveOrders(); showToastMessage(newStatus==='confirmed'?'✅ تم التأكيد':'❌ تم الرفض', newStatus==='confirmed'?'#10b981':'#ef4444'); if(newStatus==='confirmed') navigator.clipboard.writeText(`✅ تم تأكيد طلبك ${order.productTitle}`); }
    };
    function renderAllTabs() {
        renderOrderList('pendingOrdersList', orders.filter(o=>o.status==='pending'), 'pending');
        renderOrderList('confirmedOrdersList', orders.filter(o=>o.status==='confirmed'), 'confirmed');
        renderOrderList('rejectedOrdersList', orders.filter(o=>o.status==='rejected'), 'rejected');
    }
    function renderOrderList(containerId, list, type) {
        const container = document.getElementById(containerId);
        if(!container) return;
        if(list.length===0) { container.innerHTML = '<div style="text-align:center;padding:32px;">لا توجد طلبات</div>'; return; }
        let html = '';
        list.forEach(order => {
            html += `<div class="order-item-card"><img class="order-thumb" src="${order.productImage||''}" onerror="this.src='https://placehold.co/64x64'"><div style="flex:3"><div><strong>${escapeHtml(order.productTitle)}</strong> - ${order.productPrice} درهم</div><div>👤 ${escapeHtml(order.fullName)} | 📞 ${order.phone} | 📍 ${escapeHtml(order.address)}</div><div><span class="badge badge-${type==='pending'?'pending':(type==='confirmed'?'confirmed':'rejected')}">${type==='pending'?'قيد الانتظار':(type==='confirmed'?'مؤكد':'مرفوض')}</span> <small>${order.timestamp}</small></div></div><div class="order-actions">`;
            if(type === 'pending') html += `<button class="btn btn-primary btn-sm" onclick="changeOrderStatus('${order.id}','confirmed')">تأكيد</button><button class="btn btn-danger btn-sm" onclick="changeOrderStatus('${order.id}','rejected')">رفض</button>`;
            else html += `<button class="btn btn-sm" onclick="changeOrderStatus('${order.id}','pending')">إعادة للانتظار</button>`;
            html += `</div></div>`;
        });
        container.innerHTML = html;
    }
    function showToastMessage(msg, bg='#1e293b') { const t=document.getElementById('toastMsg'); t.textContent=msg; t.style.backgroundColor=bg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ return m==='&'?'&amp;': m==='<'?'&lt;': '&gt;';}); }

    // تبويبات الطلبات
    document.querySelectorAll('#ord
